# Example Samba Share Configuration

This file shows a simple example of a Samba share.

---

## Basic Share

```ini
[share]
path = /srv/nas
browseable = yes
read only = no
guest ok = no
valid users = myuser
create mask = 0775
directory mask = 0775
```

---

## Explanation

* **[share]**
  Name of the share (used in network path)

* **path**
  Directory on the server

* **browseable**
  Show in network browser

* **read only**
  If "no" → users can write

* **guest ok**
  If "yes" → no login required

* **valid users**
  Allowed users

* **create mask / directory mask**
  File and folder permissions

---

## Guest Share Example

```ini
[public]
path = /srv/public
browseable = yes
read only = no
guest ok = yes
create mask = 0777
directory mask = 0777
```

---

## Connection Examples

Windows:

```text
\\SERVER-IP\share
```

Phone:

```text
smb://SERVER-IP/share
```

---

## Important

* Restart Samba after changes:

```bash
sudo systemctl restart smbd
```

* Always test config:

```bash
testparm
```
